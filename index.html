<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIEE &mdash; Generador de Horarios 2026-1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b14;
  --bg2:#0f1120;
  --bg3:#141628;
  --card:#1a1d35;
  --card2:#20243e;
  --border:rgba(140,130,255,0.1);
  --border2:rgba(140,130,255,0.18);
  --border3:rgba(140,130,255,0.3);
  --text:#eeeaff;
  --text2:#a09dc0;
  --text3:#5a5778;

  /* Accent */
  --indigo:#6366f1;
  --indigo2:#818cf8;
  --violet:#8b5cf6;

  /* Cycle colors - vivid accent used in left panel headers */
  --cy1:#f97316; --cy1l:rgba(249,115,22,0.12);
  --cy2:#eab308; --cy2l:rgba(234,179,8,0.12);
  --cy3:#22c55e; --cy3l:rgba(34,197,94,0.12);
  --cy4:#06b6d4; --cy4l:rgba(6,182,212,0.12);
  --cy5:#8b5cf6; --cy5l:rgba(139,92,246,0.12);
  --cy6:#ec4899; --cy6l:rgba(236,72,153,0.12);
  --cy7:#f43f5e; --cy7l:rgba(244,63,94,0.12);
  --cy8:#14b8a6; --cy8l:rgba(20,184,166,0.12);
  --cy9:#a855f7; --cy9l:rgba(168,85,247,0.12);
  --cy10:#3b82f6; --cy10l:rgba(59,130,246,0.12);
  --cy11:#64748b; --cy11l:rgba(100,116,139,0.12);
}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;flex-direction:column;overflow:hidden;
}

/* ── HEADER ─────────────────────────────────────────────── */
header{
  height:58px;padding:0 1.6rem;flex-shrink:0;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:100;
}
header::after{
  content:'';position:absolute;inset-x:0;bottom:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--indigo) 30%,var(--violet) 60%,transparent 100%);
  opacity:0.6;
}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1 0%,#a855f7 100%);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 20px rgba(99,102,241,0.45);
}
.logo-name{font-size:1rem;font-weight:700;letter-spacing:-0.3px;line-height:1.1}
.logo-sub{font-size:0.62rem;font-family:'JetBrains Mono',monospace;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}
.header-center{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:0.68rem;font-family:'JetBrains Mono',monospace;
  color:var(--text3);letter-spacing:2px;text-transform:uppercase;
  pointer-events:none;
}
.header-right{display:flex;align-items:center;gap:8px}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;border:1px solid transparent;
  cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.8rem;font-weight:500;
  transition:all 0.15s;white-space:nowrap;
}
.btn-ghost{background:var(--card);color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--card2);color:var(--text);border-color:var(--border3)}
.btn-primary{background:var(--indigo);color:#fff;border-color:var(--indigo);box-shadow:0 0 16px rgba(99,102,241,0.3)}
.btn-primary:hover{background:#5254cc;box-shadow:0 0 24px rgba(99,102,241,0.45);transform:translateY(-1px)}
.btn-danger{background:rgba(244,63,94,0.1);color:#fda4af;border-color:rgba(244,63,94,0.25)}
.btn-danger:hover{background:rgba(244,63,94,0.2)}
.btn-pdf{
  background:linear-gradient(135deg,rgba(99,102,241,0.25),rgba(139,92,246,0.25));
  color:#c4c8ff;border-color:rgba(99,102,241,0.45);
  box-shadow:0 0 16px rgba(99,102,241,0.2);font-weight:600;
}
.btn-pdf:hover{
  background:linear-gradient(135deg,rgba(99,102,241,0.4),rgba(139,92,246,0.4));
  box-shadow:0 0 24px rgba(99,102,241,0.4);transform:translateY(-1px);
  border-color:rgba(99,102,241,0.7);
}

/* ── LAYOUT ─────────────────────────────────────────────── */
.app{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL ─────────────────────────────────────────── */
.panel-left{
  width:340px;flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-top{padding:1rem 1.1rem 0.9rem;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-label{
  font-size:0.6rem;font-family:'JetBrains Mono',monospace;
  letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:0.65rem;
}
.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:9px;
  padding:0 11px;margin-bottom:0.7rem;transition:border-color 0.2s;
}
.search-wrap:focus-within{border-color:var(--indigo2);box-shadow:0 0 0 3px rgba(99,102,241,0.12)}
.search-wrap svg{opacity:0.35;flex-shrink:0}
.search-wrap input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:0.83rem;
  padding:9px 0;width:100%;
}
.search-wrap input::placeholder{color:var(--text3)}
.upload-label{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:7px 11px;background:transparent;
  border:1px dashed var(--border2);border-radius:8px;
  color:var(--text3);font-family:'Outfit',sans-serif;font-size:0.76rem;
  cursor:pointer;transition:all 0.2s;
}
.upload-label:hover{border-color:var(--indigo2);color:var(--indigo2);background:rgba(99,102,241,0.05)}
#file-input{display:none}

/* Cycle chips */
.chips{
  padding:0.55rem 1.1rem;display:flex;gap:5px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.chip{
  font-size:0.67rem;font-family:'JetBrains Mono',monospace;
  padding:3px 9px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;
  color:var(--text3);cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.chip:hover{border-color:var(--indigo2);color:var(--indigo2)}
.chip.active{background:rgba(99,102,241,0.18);border-color:rgba(99,102,241,0.5);color:var(--indigo2)}

/* Course list scrollable */
.course-list{flex:1;overflow-y:auto;padding:4px 0}
.course-list::-webkit-scrollbar{width:3px}
.course-list::-webkit-scrollbar-thumb{background:var(--card2);border-radius:2px}

/* Cycle section header in list */
.cycle-header{
  padding:0.75rem 1.1rem 0.25rem;
  display:flex;align-items:center;gap:10px;
}
.cycle-header-pill{
  font-size:0.6rem;font-family:'JetBrains Mono',monospace;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;white-space:nowrap;
  border:1px solid;
}
.cycle-header-line{flex:1;height:1px}

/* Cycle color theming — applied via data-cycle attribute on .cycle-header */
.cycle-header[data-cy="1"] .cycle-header-pill{color:var(--cy1);background:var(--cy1l);border-color:rgba(249,115,22,0.3)}
.cycle-header[data-cy="1"] .cycle-header-line{background:linear-gradient(90deg,rgba(249,115,22,0.3),transparent)}
.cycle-header[data-cy="2"] .cycle-header-pill{color:var(--cy2);background:var(--cy2l);border-color:rgba(234,179,8,0.3)}
.cycle-header[data-cy="2"] .cycle-header-line{background:linear-gradient(90deg,rgba(234,179,8,0.3),transparent)}
.cycle-header[data-cy="3"] .cycle-header-pill{color:var(--cy3);background:var(--cy3l);border-color:rgba(34,197,94,0.3)}
.cycle-header[data-cy="3"] .cycle-header-line{background:linear-gradient(90deg,rgba(34,197,94,0.3),transparent)}
.cycle-header[data-cy="4"] .cycle-header-pill{color:var(--cy4);background:var(--cy4l);border-color:rgba(6,182,212,0.3)}
.cycle-header[data-cy="4"] .cycle-header-line{background:linear-gradient(90deg,rgba(6,182,212,0.3),transparent)}
.cycle-header[data-cy="5"] .cycle-header-pill{color:var(--cy5);background:var(--cy5l);border-color:rgba(139,92,246,0.3)}
.cycle-header[data-cy="5"] .cycle-header-line{background:linear-gradient(90deg,rgba(139,92,246,0.3),transparent)}
.cycle-header[data-cy="6"] .cycle-header-pill{color:var(--cy6);background:var(--cy6l);border-color:rgba(236,72,153,0.3)}
.cycle-header[data-cy="6"] .cycle-header-line{background:linear-gradient(90deg,rgba(236,72,153,0.3),transparent)}
.cycle-header[data-cy="7"] .cycle-header-pill{color:var(--cy7);background:var(--cy7l);border-color:rgba(244,63,94,0.3)}
.cycle-header[data-cy="7"] .cycle-header-line{background:linear-gradient(90deg,rgba(244,63,94,0.3),transparent)}
.cycle-header[data-cy="8"] .cycle-header-pill{color:var(--cy8);background:var(--cy8l);border-color:rgba(20,184,166,0.3)}
.cycle-header[data-cy="8"] .cycle-header-line{background:linear-gradient(90deg,rgba(20,184,166,0.3),transparent)}
.cycle-header[data-cy="9"] .cycle-header-pill{color:var(--cy9);background:var(--cy9l);border-color:rgba(168,85,247,0.3)}
.cycle-header[data-cy="9"] .cycle-header-line{background:linear-gradient(90deg,rgba(168,85,247,0.3),transparent)}
.cycle-header[data-cy="10"] .cycle-header-pill{color:var(--cy10);background:var(--cy10l);border-color:rgba(59,130,246,0.3)}
.cycle-header[data-cy="10"] .cycle-header-line{background:linear-gradient(90deg,rgba(59,130,246,0.3),transparent)}
.cycle-header[data-cy="11"] .cycle-header-pill{color:var(--cy11);background:var(--cy11l);border-color:rgba(100,116,139,0.3)}
.cycle-header[data-cy="11"] .cycle-header-line{background:linear-gradient(90deg,rgba(100,116,139,0.3),transparent)}

/* Course item */
.course-item{
  padding:0.5rem 1.1rem;display:flex;align-items:flex-start;gap:9px;
  cursor:pointer;transition:background 0.12s;position:relative;
  border-left:3px solid transparent;
}
.course-item:hover{background:rgba(255,255,255,0.03)}
.course-item.selected{background:rgba(99,102,241,0.08);border-left-color:var(--indigo)}
.course-item.conflict{opacity:0.35;pointer-events:none}

.check-box{
  width:16px;height:16px;border-radius:5px;flex-shrink:0;margin-top:2px;
  border:1.5px solid var(--border3);background:transparent;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.course-item.selected .check-box{background:var(--indigo);border-color:var(--indigo)}
.course-item.selected .check-box::after{
  content:'';display:block;width:8px;height:5px;
  border-left:2px solid #fff;border-bottom:2px solid #fff;
  transform:rotate(-45deg) translate(1px,-1px);
}
.course-info{flex:1;min-width:0}
.course-name{font-size:0.79rem;font-weight:500;color:var(--text);line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.course-meta{font-size:0.66rem;color:var(--text3);margin-top:2px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.course-cod{
  font-family:'JetBrains Mono',monospace;font-size:0.64rem;
  padding:1px 5px;border-radius:3px;
}
.conflict-pill{font-size:0.6rem;color:#fda4af;background:rgba(244,63,94,0.1);padding:1px 6px;border-radius:10px;border:1px solid rgba(244,63,94,0.2)}

/* Cycle-tinted cod badge */
.ci-1 .course-cod{color:var(--cy1);background:var(--cy1l)}
.ci-2 .course-cod{color:var(--cy2);background:var(--cy2l)}
.ci-3 .course-cod{color:var(--cy3);background:var(--cy3l)}
.ci-4 .course-cod{color:var(--cy4);background:var(--cy4l)}
.ci-5 .course-cod{color:var(--cy5);background:var(--cy5l)}
.ci-6 .course-cod{color:var(--cy6);background:var(--cy6l)}
.ci-7 .course-cod{color:var(--cy7);background:var(--cy7l)}
.ci-8 .course-cod{color:var(--cy8);background:var(--cy8l)}
.ci-9 .course-cod{color:var(--cy9);background:var(--cy9l)}
.ci-10 .course-cod{color:var(--cy10);background:var(--cy10l)}
.ci-11 .course-cod{color:var(--cy11);background:var(--cy11l)}

/* ── RIGHT PANEL ─────────────────────────────────────────── */
.panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.top-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0.55rem 1.1rem 0.55rem 1.3rem;flex-shrink:0;min-height:54px;
}
.tags-area{
  flex:1;display:flex;align-items:center;gap:7px;flex-wrap:wrap;min-width:0;
}
.top-bar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.empty-hint{font-size:0.78rem;color:var(--text3);font-style:italic}

.sel-tag{
  display:flex;align-items:center;gap:5px;
  padding:3px 9px 3px 9px;border-radius:20px;
  font-size:0.68rem;font-weight:600;font-family:'JetBrains Mono',monospace;
}
.sel-tag .rx{
  width:14px;height:14px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-style:normal;
  font-size:0.7rem;opacity:0.65;transition:opacity 0.15s;
}
.sel-tag .rx:hover{opacity:1}

/* Conflict alert */
.conf-alert{
  margin:0.5rem 1.3rem 0;padding:9px 14px;border-radius:8px;
  background:rgba(244,63,94,0.07);border:1px solid rgba(244,63,94,0.2);
  font-size:0.74rem;color:#fda4af;display:none;align-items:center;gap:8px;flex-shrink:0;
}
.conf-alert.show{display:flex}

/* Schedule scroll area */
.sched-wrap{flex:1;overflow:auto;padding:1.5rem;background:var(--bg)}
.sched-wrap::-webkit-scrollbar{width:5px;height:5px}
.sched-wrap::-webkit-scrollbar-thumb{background:var(--card2);border-radius:3px}

/* Empty state */
.empty-state{
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
  color:var(--text3);text-align:center;
}
.empty-icon{
  width:76px;height:76px;border-radius:18px;
  background:var(--card);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;margin-bottom:0.4rem;
}
.empty-state h3{font-size:1rem;font-weight:600;color:var(--text2)}
.empty-state p{font-size:0.79rem;line-height:1.7;max-width:240px}

/* Stats bar */
.stats-bar{
  padding:0.5rem 1.3rem;border-top:1px solid var(--border);
  background:var(--bg2);display:flex;gap:1.8rem;flex-shrink:0;
  font-size:0.7rem;color:var(--text3);
}
.stat{display:flex;align-items:center;gap:6px}
.stat-val{color:var(--indigo2);font-weight:700;font-family:'JetBrains Mono',monospace}

/* ── SCHEDULE TABLE ──────────────────────────────────────── */
.sched-grid{min-width:660px}

.sched-title{
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  letter-spacing:2.5px;text-transform:uppercase;
  margin-bottom:1.2rem;display:flex;align-items:center;gap:12px;
  background:linear-gradient(90deg,var(--indigo2),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sched-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(99,102,241,0.4),transparent);
  -webkit-text-fill-color:initial;
}

table.sched{width:100%;border-collapse:separate;border-spacing:0}

/* Day column headers */
table.sched th{
  padding:0;text-align:center;
  font-size:0;background:transparent;
  position:sticky;top:0;z-index:5;
}
table.sched th:first-child{width:52px}
.day-head{
  margin:0 3px 4px;padding:9px 6px;border-radius:8px 8px 0 0;
  font-size:0.65rem;font-family:'JetBrains Mono',monospace;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;color:var(--text2);
  background:var(--card);border:1px solid var(--border);border-bottom:none;
}
/* highlight today */
.day-head.today{color:var(--indigo2);background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.3)}

/* Row */
table.sched td{height:46px;padding:2px 3px;vertical-align:top}
table.sched td:first-child{
  font-family:'JetBrains Mono',monospace;font-size:0.58rem;
  color:var(--text3);text-align:right;padding-right:10px;padding-top:6px;
  vertical-align:top;
}

/* Alternating row tints for readability */
table.sched tbody tr:nth-child(even) td:not(:first-child) .cell-empty{background:rgba(255,255,255,0.018)}
table.sched tbody tr:nth-child(odd) td:not(:first-child) .cell-empty{background:rgba(255,255,255,0.008)}

.cell-empty{
  width:100%;height:100%;border-radius:5px;
  background:rgba(255,255,255,0.012);
  transition:background 0.12s;
}
table.sched tr:hover .cell-empty{background:rgba(255,255,255,0.035)}

/* Session block — 8 intercalated color schemes */
.cell-block{
  width:100%;height:100%;border-radius:6px;
  padding:5px 7px;display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden;cursor:default;
  border-left:3px solid;
}
.cell-code{font-family:'JetBrains Mono',monospace;font-size:0.61rem;font-weight:700;line-height:1.2}
.cell-secc{opacity:0.6;font-weight:400}
.cell-type-pill{
  font-size:0.53rem;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;
  padding:1px 4px;border-radius:3px;display:inline-block;margin-top:2px;width:fit-content;
}
.cell-room{font-size:0.55rem;opacity:0.55;margin-top:1px;line-height:1}

/* 8 color schemes — intercalated */
.cc0{background:rgba(99,102,241,0.18);border-left-color:#6366f1;color:#c4c8ff}
.cc0 .cell-type-pill{background:rgba(99,102,241,0.3)}
.cc1{background:rgba(20,184,166,0.16);border-left-color:#14b8a6;color:#7de8d8}
.cc1 .cell-type-pill{background:rgba(20,184,166,0.3)}
.cc2{background:rgba(245,158,11,0.15);border-left-color:#f59e0b;color:#fcd884}
.cc2 .cell-type-pill{background:rgba(245,158,11,0.3)}
.cc3{background:rgba(236,72,153,0.15);border-left-color:#ec4899;color:#f9aed0}
.cc3 .cell-type-pill{background:rgba(236,72,153,0.3)}
.cc4{background:rgba(59,130,246,0.16);border-left-color:#3b82f6;color:#93c5fd}
.cc4 .cell-type-pill{background:rgba(59,130,246,0.3)}
.cc5{background:rgba(168,85,247,0.15);border-left-color:#a855f7;color:#d8b4fe}
.cc5 .cell-type-pill{background:rgba(168,85,247,0.3)}
.cc6{background:rgba(34,197,94,0.14);border-left-color:#22c55e;color:#86efac}
.cc6 .cell-type-pill{background:rgba(34,197,94,0.3)}
.cc7{background:rgba(244,63,94,0.14);border-left-color:#f43f5e;color:#fda4af}
.cc7 .cell-type-pill{background:rgba(244,63,94,0.3)}

/* ── MODAL ───────────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(5,6,15,0.82);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
.modal{
  background:var(--card);border:1px solid var(--border2);
  border-radius:16px;width:100%;max-width:490px;max-height:84vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,0.7);
}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--card2);border-radius:2px}
.modal-head{
  padding:1.2rem 1.4rem 0.9rem;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  position:sticky;top:0;background:var(--card);z-index:2;
}
.modal-title{font-size:0.92rem;font-weight:600;color:var(--text);line-height:1.3}
.modal-sub{font-size:0.7rem;color:var(--text3);margin-top:3px}
.modal-close{

let allCourses=[], selected={}, colorMap={}, colorIdx=0, filterCycle="all";

function processData(rows){
  const map={};
  rows.forEach(function(r){
    const k=r.cod+"|"+r.secc;
    if(!map[k]) map[k]={cod:r.cod,curso:r.curso,secc:r.secc,ciclo:r.ciclo,docente:r.docente,sessions:[]};
    map[k].sessions.push({tipo:r.tipo,dia:r.dia,hIni:r.hIni,hFin:r.hFin,salon:r.salon});
  });
  const cm={};
  Object.values(map).forEach(function(s){
    if(!cm[s.cod]) cm[s.cod]={cod:s.cod,curso:s.curso,ciclo:s.ciclo,sections:[]};
    cm[s.cod].sections.push(s);
  });
  allCourses=Object.values(cm).sort(function(a,b){
    return a.ciclo-b.ciclo||a.cod.localeCompare(b.cod);
  });
  selected={};colorMap={};colorIdx=0;
  buildChips();renderList();renderSchedule();renderTags();
}

function buildChips(){
  const cycles=[...new Set(allCourses.map(function(c){return c.ciclo;}))].sort(function(a,b){return a-b;});
  const el=document.getElementById("cycle-chips");
  el.innerHTML="";
  const allBtn=document.createElement("button");
  allBtn.className="chip active";allBtn.textContent="Todos";
  allBtn.addEventListener("click",function(){filterByCycle("all",this);});
  el.appendChild(allBtn);
  cycles.forEach(function(c){
    const b=document.createElement("button");
    b.className="chip";
    b.textContent=CYCLE_NAMES[c]||("C"+c);
    b.addEventListener("click",function(){filterByCycle(c,this);});
    el.appendChild(b);
  });
}

function filterByCycle(c,el){
  filterCycle=c;
  document.querySelectorAll(".chip").forEach(function(x){x.classList.remove("active");});
  el.classList.add("active");
  filterCourses();
}

function filterCourses(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  const list=allCourses.filter(function(c){
    const cm=filterCycle==="all"||c.ciclo==filterCycle;
    const qm=!q||c.cod.toLowerCase().includes(q)||c.curso.toLowerCase().includes(q);
    return cm&&qm;
  });
  renderList(list);
}

function renderList(courses){
  if(!courses) courses=allCourses;
  const el=document.getElementById("course-list");
  if(!courses.length){
    el.innerHTML="<div style=\"padding:2rem;color:var(--text3);font-size:0.8rem;text-align:center\">Sin resultados</div>";
    return;
  }
  let html="", lastCy=null;
  courses.forEach(function(c){
    if(c.ciclo!==lastCy){
      lastCy=c.ciclo;
      const lab=CYCLE_LABELS[c.ciclo]||c.ciclo;
      html+="<div class=\"cycle-header\" data-cy=\""+c.ciclo+"\">";
      html+="<div class=\"cycle-header-pill\">"+lab+" CICLO</div>";
      html+="<div class=\"cycle-header-line\"></div>";
      html+="</div>";
    }
    const isSel=!!selected[c.cod];
    const isConf=!isSel&&hasConflict(c);
    const selSec=selected[c.cod];
    const meta=selSec
      ?"Secc. "+selSec.secc+" \u00b7 "+selSec.sessions.length+" sesiones"
      :c.sections.length+(c.sections.length>1?" secciones":" secci\u00f3n");
    html+="<div class=\"course-item ci-"+c.ciclo+(isSel?" selected":"")+(isConf?" conflict":"")+"\" data-cod=\""+c.cod+"\">";
    html+="<div class=\"check-box\"></div>";
    html+="<div class=\"course-info\">";
    html+="<div class=\"course-name\">"+c.curso+"</div>";
    html+="<div class=\"course-meta\">";
    html+="<span class=\"course-cod\">"+c.cod+"</span>";
    html+="<span>"+meta+"</span>";
    if(isConf) html+="<span class=\"conflict-pill\">conflicto</span>";
    html+="</div></div></div>";
  });
  el.innerHTML=html;
  el.querySelectorAll(".course-item").forEach(function(item){
    item.addEventListener("click",function(){toggleCourse(item.dataset.cod);});
  });
}

function toggleCourse(cod){
  if(selected[cod]){delete selected[cod];delete colorMap[cod];refresh();return;}
  const c=allCourses.find(function(x){return x.cod===cod;});
  if(!c) return;
  if(c.sections.length===1){addSection(c.sections[0],cod);}
  else showModal(c);
}

function addSection(sec,cod){
  if(!colorMap[cod]){colorMap[cod]=COLORS[colorIdx%COLORS.length];colorIdx++;}
  selected[cod]=sec;
  document.getElementById("modal-overlay").style.display="none";
  refresh();
}

function refresh(){filterCourses();renderSchedule();renderTags();}

function hasConflict(course){
  return course.sections.every(function(s){return conflictsSec(s);});
}
function conflictsSec(sec){
  return sec.sessions.some(function(ss){
    return Object.values(selected).some(function(sel){
      return sel.sessions.some(function(s){
        return s.dia===ss.dia&&!(ss.hFin<=s.hIni||ss.hIni>=s.hFin);
      });
    });
  });
}

function showModal(course){
  document.getElementById("modal-title").textContent=course.curso;
  document.getElementById("modal-sub").textContent=
    course.cod+" \u00b7 "+CYCLE_NAMES[course.ciclo]+" \u00b7 Elige una secci\u00f3n";
  const body=document.getElementById("modal-body");
  let html="";
  course.sections.forEach(function(sec,i){
    const isConf=conflictsSec(sec);
    html+="<div class=\"sec-card"+(isConf?" conflict-sec":"")+"\" data-idx=\""+i+"\">";
    html+="<div class=\"sec-card-top\">";
    html+="<span class=\"sec-badge\">Secci\u00f3n "+sec.secc+"</span>";
    if(isConf) html+="<span class=\"sec-conflict\">Conflicto de horario</span>";
    html+="</div>";
    if(sec.docente) html+="<div class=\"sec-docente\">"+sec.docente+"</div>";
    sec.sessions.forEach(function(s){
      html+="<div class=\"ses-row\">";
      html+="<span class=\"t-"+s.tipo+"\">"+(TNAMES[s.tipo]||s.tipo)+"</span>";
      html+="<span>"+(DNAMES[s.dia]||s.dia)+" "+s.hIni+":00\u2013"+s.hFin+":00</span>";
      html+="<span style=\"color:var(--text3)\">"+s.salon+"</span>";
      html+="</div>";
    });
    html+="</div>";
  });
  body.innerHTML=html;
  body.querySelectorAll(".sec-card").forEach(function(card){
    const idx=parseInt(card.dataset.idx);
    card.addEventListener("click",function(){addSection(course.sections[idx],course.cod);});
  });
  document.getElementById("modal-overlay").style.display="flex";
}

function closeOverlay(e){
  if(e.target===document.getElementById("modal-overlay"))
    document.getElementById("modal-overlay").style.display="none";
}

function renderTags(){
  const keys=Object.keys(selected);
  const bar=document.getElementById("sel-bar");
  const btnClear=document.getElementById("btn-clear");
  const stats=document.getElementById("stats-bar");

  if(!keys.length){
    bar.innerHTML="<span class=\"empty-hint\">&#8592; Selecciona cursos para armar tu horario</span>";
    btnClear.style.display="none";
    stats.style.display="none";
    return;
  }

  const tagHex={cc0:"#6366f1",cc1:"#14b8a6",cc2:"#f59e0b",cc3:"#ec4899",
                cc4:"#3b82f6",cc5:"#a855f7",cc6:"#22c55e",cc7:"#f43f5e"};
  let html2="";
  keys.forEach(function(cod){
    const sec=selected[cod];const col=colorMap[cod]||"cc0";const hex=tagHex[col];
    html2+="<div class=\"sel-tag\" style=\"background:"+hex+"1e;border:1px solid "+hex+"45;color:"+hex+";\" data-cod=\""+cod+"\">";
    html2+=cod+" <span style=\"opacity:0.65\">"+sec.secc+"</span>";
    html2+="<i class=\"rx\">\u00d7</i></div>";
  });
  bar.innerHTML=html2;
  bar.querySelectorAll(".sel-tag").forEach(function(tag){
    tag.querySelector(".rx").addEventListener("click",function(e){
      e.stopPropagation();toggleCourse(tag.dataset.cod);
    });
  });

  btnClear.style.display="";
  stats.style.display="flex";

  let h=0;
  Object.values(selected).forEach(function(s){
    s.sessions.forEach(function(x){h+=x.hFin-x.hIni;});
  });
  document.getElementById("s-courses").textContent=keys.length;
  document.getElementById("s-hours").textContent=h;
  const cy=[...new Set(allCourses.filter(function(c){return selected[c.cod];}).map(function(c){return c.ciclo;}))].sort(function(a,b){return a-b;});
  document.getElementById("s-cycles").textContent=cy.map(function(n){return n===11?"Elec.":n+"\u00b0";}).join(", ");
}

function renderSchedule(){
  const keys=Object.keys(selected);
  const display=document.getElementById("sched-display");
  if(!keys.length){
    display.innerHTML="<div class=\"empty-state\"><div class=\"empty-icon\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" opacity=\"0.35\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"/><line x1=\"16\" x2=\"16\" y1=\"2\" y2=\"6\"/><line x1=\"8\" x2=\"8\" y1=\"2\" y2=\"6\"/><line x1=\"3\" x2=\"21\" y1=\"10\" y2=\"10\"/></svg></div><h3>Tu horario aparecer\u00e1 aqu\u00ed</h3><p>Selecciona cursos desde el panel izquierdo para armar tu semestre.</p></div>";
    return;
  }

  const cells={};const conflicts=[];
  keys.forEach(function(cod){
    const sec=selected[cod];const col=colorMap[cod]||"cc0";
    sec.sessions.forEach(function(s){
      for(let h=s.hIni;h<s.hFin;h++){
        const k=s.dia+"-"+h;
        if(cells[k]&&cells[k].cod!==cod)
          conflicts.push(cells[k].cod+" y "+cod+" \u2014 "+(DNAMES[s.dia]||s.dia)+" "+h+":00");
        cells[k]={cod:cod,secc:sec.secc,tipo:s.tipo,salon:s.salon,color:col};
      }
    });
  });

  const alertEl=document.getElementById("conf-alert");
  if(conflicts.length){
    alertEl.classList.add("show");
    document.getElementById("conf-msg").textContent=
      "Conflicto: "+conflicts[0]+(conflicts.length>1?" (+"+(conflicts.length-1)+" m\u00e1s)":"");
  } else {
    alertEl.classList.remove("show");
  }

  const allH=[];
  Object.values(selected).forEach(function(s){
    s.sessions.forEach(function(x){allH.push(x.hIni);allH.push(x.hFin);});
  });
  const minH=Math.min.apply(null,allH), maxH=Math.max.apply(null,allH);
  const hours=[];for(let i=minH;i<maxH;i++) hours.push(i);

  /* today's day for highlight */
  const todayMap=["DO","LU","MA","MI","JU","VI","SA"];
  const todayKey=todayMap[new Date().getDay()];

  let html="<div class=\"sched-grid\" id=\"printable\">";
  html+="<div class=\"sched-title\">&#9654; HORARIO SEMANAL &middot; 2026-1</div>";
  html+="<table class=\"sched\"><thead><tr><th></th>";
  DAYS.forEach(function(d){
    const isToday=d===todayKey;
    html+="<th><div class=\"day-head"+(isToday?" today":"")+"\">"+(DNAMES[d]||d)+"</div></th>";
  });
  html+="</tr></thead><tbody>";

  hours.forEach(function(h){
    html+="<tr>";
    html+="<td>"+h+":00</td>";
    DAYS.forEach(function(d){
      const c=cells[d+"-"+h];
      if(!c){html+="<td><div class=\"cell-empty\"></div></td>";return;}
      html+="<td><div class=\"cell-block "+c.color+"\">";
      html+="<div class=\"cell-code\">"+c.cod+" <span class=\"cell-secc\">"+c.secc+"</span></div>";
      html+="<div class=\"cell-type-pill\">"+(TNAMES[c.tipo]||c.tipo)+"</div>";
      if(c.salon) html+="<div class=\"cell-room\">"+c.salon+"</div>";
      html+="</div></td>";
    });
    html+="</tr>";
  });
  html+="</tbody></table></div>";
  display.innerHTML=html;
}

function clearAll(){selected={};colorMap={};colorIdx=0;refresh();}

function downloadPDF(){
  const el=document.getElementById("printable");
  if(!el){showToast("No hay horario para exportar","error");return;}
  showToast("Generando PDF\u2026","success");
  html2canvas(el,{backgroundColor:"#0a0b14",scale:2.5,useCORS:true,logging:false}).then(function(canvas){
    const W=canvas.width/2.5, H=canvas.height/2.5;
    const pdf=new window.jspdf.jsPDF({
      orientation:W>H?"landscape":"portrait",unit:"px",format:[W+48,H+60]
    });
    pdf.setFillColor(10,11,20);pdf.rect(0,0,W+48,H+60,"F");
    pdf.setTextColor(99,102,241);pdf.setFontSize(9);
    pdf.text("FIEE \u00b7 UNI \u2014 HORARIO 2026-1",24,20);
    pdf.addImage(canvas.toDataURL("image/png"),"PNG",24,32,W,H);
    pdf.save("horario_fiee_2026-1.pdf");
    showToast("\u2713 PDF descargado correctamente","success");
  }).catch(function(){showToast("Error al generar PDF","error");});
}

function showToast(msg,type){
  const t=document.getElementById("toast");
  document.getElementById("toast-msg").textContent=msg;
  t.className="toast show "+(type||"");
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.classList.remove("show");},3200);
}

function loadExcel(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const rows=[];
      const CNAMES={PRIMER:1,SEGUNDO:2,TERCER:3,CUARTO:4,QUINTO:5,SEXTO:6,SEPTIMO:7,OCTAVO:8,NOVENO:9,DECIMO:10,ELECTIVOS:11};
      let cy=1;
      wb.SheetNames.forEach(function(name){
        const ws=wb.Sheets[name];
        const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        let hi=-1;
        for(let i=0;i<json.length;i++){
          const r=json[i].map(function(c){return String(c).toUpperCase().trim();});
          if(r.indexOf("COD")>=0&&r.indexOf("CURSO")>=0){hi=i;break;}
        }
        if(hi<0) return;
        const hs=json[hi].map(function(c){return String(c).toUpperCase().trim();});
        const ix=function(h){return hs.indexOf(h);};
        const iC=ix("COD"),iCu=ix("CURSO"),iS=ix("SECC"),iTi=ix("TIPO");
        const iCy=ix("CICLO"),iD=ix("DIA"),iHi=ix("H INI"),iHf=ix("H FIN"),iSa=ix("SALON"),iDo=ix("DOCENTE");
        for(let i=hi+1;i<json.length;i++){
          const r=json[i];
          if(!r[iC]&&r[0]){const w=String(r[0]).toUpperCase().split(" ")[0];if(CNAMES[w]) cy=CNAMES[w];continue;}
          if(!r[iC]||!r[iCu]||!r[iD]) continue;
          const hIni=parseInt(r[iHi]),hFin=parseInt(r[iHf]);
          if(isNaN(hIni)||isNaN(hFin)) continue;
          rows.push({
            cod:String(r[iC]).trim(),curso:String(r[iCu]).trim(),
            secc:String(r[iS]).trim().toUpperCase(),tipo:String(r[iTi]).trim().toUpperCase(),
            ciclo:parseInt(r[iCy])||cy,dia:String(r[iD]).trim().toUpperCase(),
            hIni:hIni,hFin:hFin,
            salon:iSa>=0?String(r[iSa]).trim():"",
            docente:iDo>=0?String(r[iDo]).trim():""
          });
        }
      });
      if(!rows.length){showToast("No se encontraron datos v\u00e1lidos","error");return;}
      processData(rows);
      showToast("\u2713 "+rows.length+" sesiones cargadas","success");
    }catch(err){showToast("Error: "+err.message,"error");}
  };
  reader.readAsBinaryString(file);
}

window.addEventListener("DOMContentLoaded",function(){processData(FIEE_DATA);});

</script>
