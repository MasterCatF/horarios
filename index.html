<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIEE &mdash; Generador de Horarios 2026-1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090e;
  --bg2:#0d0f18;
  --bg3:#12141f;
  --card:#181a27;
  --card2:#1e2030;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.11);
  --border3:rgba(255,255,255,0.18);
  --text:#e8e4ff;
  --text2:#9895b8;
  --text3:#4d4a6a;
  --accent:#6366f1;
  --accent2:#818cf8;
  --accent3:#a5b4fc;

  --c0-bg:rgba(99,102,241,0.15); --c0-border:rgba(99,102,241,0.4); --c0-text:#a5b4fc; --c0-bar:#6366f1;
  --c1-bg:rgba(20,184,166,0.13); --c1-border:rgba(20,184,166,0.38); --c1-text:#5eead4; --c1-bar:#14b8a6;
  --c2-bg:rgba(244,63,94,0.13);  --c2-border:rgba(244,63,94,0.38);  --c2-text:#fda4af; --c2-bar:#f43f5e;
  --c3-bg:rgba(245,158,11,0.13); --c3-border:rgba(245,158,11,0.38); --c3-text:#fcd34d; --c3-bar:#f59e0b;
  --c4-bg:rgba(59,130,246,0.13); --c4-border:rgba(59,130,246,0.38); --c4-text:#93c5fd; --c4-bar:#3b82f6;
  --c5-bg:rgba(168,85,247,0.13); --c5-border:rgba(168,85,247,0.38); --c5-text:#d8b4fe; --c5-bar:#a855f7;
  --c6-bg:rgba(34,197,94,0.13);  --c6-border:rgba(34,197,94,0.38);  --c6-text:#86efac; --c6-bar:#22c55e;
  --c7-bg:rgba(236,72,153,0.13); --c7-border:rgba(236,72,153,0.38); --c7-text:#f9a8d4; --c7-bar:#ec4899;
}

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─── HEADER ─────────────────────────────────────── */
header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  position:relative;
  z-index:100;
}
header::after{
  content:'';position:absolute;inset-x:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,0.5),transparent);
}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 0 20px rgba(99,102,241,0.4);
}
.logo-text{font-size:0.95rem;font-weight:700;letter-spacing:-0.3px;color:var(--text)}
.logo-sub{font-size:0.7rem;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.header-center{
  position:absolute;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:0.68rem;
  color:var(--text3);letter-spacing:2px;text-transform:uppercase;
}
.header-right{display:flex;align-items:center;gap:8px}

/* ─── BUTTONS ────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:0.8rem;font-weight:500;
  transition:all 0.15s;white-space:nowrap;
}
.btn svg{flex-shrink:0}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--card2);border-color:var(--border3);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(99,102,241,0.3)}
.btn-primary:hover{background:#5254cc;transform:translateY(-1px);box-shadow:0 4px 24px rgba(99,102,241,0.4)}
.btn-danger{background:rgba(244,63,94,0.1);color:#fda4af;border:1px solid rgba(244,63,94,0.2)}
.btn-danger:hover{background:rgba(244,63,94,0.2)}
.btn-pdf{background:rgba(245,158,11,0.1);color:#fcd34d;border:1px solid rgba(245,158,11,0.2)}
.btn-pdf:hover{background:rgba(245,158,11,0.2)}

/* ─── LAYOUT ─────────────────────────────────────── */
.app{display:flex;flex:1;overflow:hidden}

/* ─── LEFT PANEL ─────────────────────────────────── */
.panel-left{
  width:340px;flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-top{padding:1rem 1.2rem;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-label{font-size:0.62rem;font-family:'JetBrains Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:0.7rem}

/* Search */
.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:9px;
  padding:0 12px;margin-bottom:0.7rem;
  transition:border-color 0.2s;
}
.search-wrap:focus-within{border-color:var(--accent2)}
.search-wrap svg{opacity:0.35;flex-shrink:0}
.search-wrap input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:0.83rem;
  padding:9px 0;width:100%;
}
.search-wrap input::placeholder{color:var(--text3)}

/* Upload */
.upload-label{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:8px 12px;background:transparent;
  border:1px dashed var(--border2);border-radius:8px;
  color:var(--text3);font-family:'Outfit',sans-serif;font-size:0.78rem;
  cursor:pointer;transition:all 0.2s;
}
.upload-label:hover{border-color:var(--accent2);color:var(--accent3);background:rgba(99,102,241,0.04)}
#file-input{display:none}

/* Cycle chips */
.chips{padding:0.6rem 1.2rem;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;max-height:80px}
.chip{
  font-size:0.68rem;font-family:'JetBrains Mono',monospace;
  padding:3px 9px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;
  color:var(--text3);cursor:pointer;transition:all 0.15s;
  white-space:nowrap;
}
.chip:hover{border-color:var(--accent2);color:var(--accent3)}
.chip.active{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.5);color:var(--accent3)}

/* Course list */
.course-list{flex:1;overflow-y:auto;padding:4px 0}
.course-list::-webkit-scrollbar{width:3px}
.course-list::-webkit-scrollbar-thumb{background:var(--card2);border-radius:2px}

.cycle-header{
  padding:0.65rem 1.2rem 0.25rem;
  font-size:0.6rem;font-family:'JetBrains Mono',monospace;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);
  display:flex;align-items:center;gap:8px;
}
.cycle-header::after{content:'';flex:1;height:1px;background:var(--border)}

.course-item{
  padding:0.55rem 1.2rem;display:flex;align-items:flex-start;gap:10px;
  cursor:pointer;transition:background 0.12s;position:relative;
}
.course-item:hover{background:var(--card)}
.course-item.selected{background:rgba(99,102,241,0.07)}
.course-item.conflict{opacity:0.4;pointer-events:none}

.check-box{
  width:17px;height:17px;border-radius:5px;flex-shrink:0;margin-top:1px;
  border:1.5px solid var(--border3);background:transparent;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.course-item.selected .check-box{background:var(--accent);border-color:var(--accent)}
.course-item.selected .check-box::after{
  content:'';display:block;width:9px;height:6px;
  border-left:2px solid #fff;border-bottom:2px solid #fff;
  transform:rotate(-45deg) translate(1px,-1px);
}
.course-info{flex:1;min-width:0}
.course-name{font-size:0.8rem;font-weight:500;color:var(--text);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.course-meta{font-size:0.67rem;color:var(--text3);margin-top:2px;display:flex;gap:8px;align-items:center}
.course-cod{font-family:'JetBrains Mono',monospace;font-size:0.65rem;background:rgba(99,102,241,0.12);color:var(--accent3);padding:1px 5px;border-radius:3px}
.conflict-pill{font-size:0.6rem;color:#fda4af;background:rgba(244,63,94,0.1);padding:1px 6px;border-radius:10px;border:1px solid rgba(244,63,94,0.2)}

/* ─── RIGHT PANEL ────────────────────────────────── */
.panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.selected-bar{
  padding:0.6rem 1.4rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:var(--bg2);flex-shrink:0;min-height:52px;
}
.sel-tag{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px 4px 10px;border-radius:20px;
  font-size:0.7rem;font-weight:600;cursor:default;
  font-family:'JetBrains Mono',monospace;
  transition:all 0.15s;
}
.sel-tag .rx{
  width:15px;height:15px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;opacity:0.7;font-style:normal;
}
.sel-tag .rx:hover{opacity:1}
.empty-hint{font-size:0.78rem;color:var(--text3);font-style:italic}
.bar-actions{margin-left:auto;display:flex;gap:7px;flex-shrink:0}

/* Schedule container */
.sched-wrap{flex:1;overflow:auto;padding:1.6rem;background:var(--bg)}
.sched-wrap::-webkit-scrollbar{width:6px;height:6px}
.sched-wrap::-webkit-scrollbar-thumb{background:var(--card2);border-radius:3px}

/* Empty state */
.empty-state{
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.2rem;
  color:var(--text3);text-align:center;
}
.empty-icon{
  width:80px;height:80px;border-radius:20px;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:0.5rem;
}
.empty-state h3{font-size:1rem;font-weight:600;color:var(--text2)}
.empty-state p{font-size:0.8rem;line-height:1.7;max-width:260px}

/* Conflict alert */
.conf-alert{
  margin:0.6rem 1.4rem 0;padding:9px 14px;border-radius:8px;
  background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.2);
  font-size:0.75rem;color:#fda4af;
  display:none;align-items:center;gap:8px;flex-shrink:0;
}
.conf-alert.show{display:flex}

/* Stats bar */
.stats-bar{
  padding:0.55rem 1.4rem;border-top:1px solid var(--border);
  background:var(--bg2);display:flex;gap:1.8rem;flex-shrink:0;
  font-size:0.7rem;color:var(--text3);
}
.stat{display:flex;align-items:center;gap:6px}
.stat-val{color:var(--text2);font-weight:600;font-family:'JetBrains Mono',monospace}

/* ─── SCHEDULE TABLE ─────────────────────────────── */
.sched-title{
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  letter-spacing:2px;text-transform:uppercase;color:var(--text3);
  margin-bottom:1.2rem;display:flex;align-items:center;gap:12px;
}
.sched-title::before{content:'▸';color:var(--accent)}
.sched-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

.sched-grid{min-width:640px}

table.sched{width:100%;border-collapse:separate;border-spacing:0 0}

/* Day headers */
table.sched th{
  padding:10px 8px;text-align:center;
  font-size:0.68rem;font-family:'JetBrains Mono',monospace;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;color:var(--text3);
  background:transparent;position:sticky;top:0;z-index:2;
}
table.sched th:first-child{text-align:right;width:58px;padding-right:12px}
.day-col-head{
  background:var(--card);border-radius:8px 8px 0 0;
  padding:10px;
}

/* Row */
table.sched tr td{height:48px;padding:2px 3px;vertical-align:top}
table.sched tr td:first-child{
  padding-right:12px;text-align:right;
  font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text3);
  vertical-align:top;padding-top:6px;
}
table.sched tr:hover td:not(:first-child) .cell-empty{background:var(--card)}

.cell-empty{
  width:100%;height:100%;border-radius:6px;
  background:var(--bg3);transition:background 0.12s;
}

/* Session block */
.cell-block{
  width:100%;height:100%;border-radius:7px;
  padding:6px 8px;display:flex;flex-direction:column;
  justify-content:center;position:relative;overflow:hidden;
  cursor:default;
}
.cell-block::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:7px 0 0 7px;
}
.cell-code{font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:600;line-height:1.2}
.cell-type-badge{
  font-size:0.55rem;font-weight:600;letter-spacing:0.5px;
  padding:1px 5px;border-radius:3px;display:inline-block;margin-top:2px;width:fit-content;
}
.cell-room{font-size:0.57rem;opacity:0.6;margin-top:1px;line-height:1}

/* Color classes */
.c0{background:var(--c0-bg);border:1px solid var(--c0-border);color:var(--c0-text)}
.c0::before{background:var(--c0-bar)}
.c0 .cell-type-badge{background:rgba(99,102,241,0.25)}

.c1{background:var(--c1-bg);border:1px solid var(--c1-border);color:var(--c1-text)}
.c1::before{background:var(--c1-bar)}
.c1 .cell-type-badge{background:rgba(20,184,166,0.25)}

.c2{background:var(--c2-bg);border:1px solid var(--c2-border);color:var(--c2-text)}
.c2::before{background:var(--c2-bar)}
.c2 .cell-type-badge{background:rgba(244,63,94,0.25)}

.c3{background:var(--c3-bg);border:1px solid var(--c3-border);color:var(--c3-text)}
.c3::before{background:var(--c3-bar)}
.c3 .cell-type-badge{background:rgba(245,158,11,0.25)}

.c4{background:var(--c4-bg);border:1px solid var(--c4-border);color:var(--c4-text)}
.c4::before{background:var(--c4-bar)}
.c4 .cell-type-badge{background:rgba(59,130,246,0.25)}

.c5{background:var(--c5-bg);border:1px solid var(--c5-border);color:var(--c5-text)}
.c5::before{background:var(--c5-bar)}
.c5 .cell-type-badge{background:rgba(168,85,247,0.25)}

.c6{background:var(--c6-bg);border:1px solid var(--c6-border);color:var(--c6-text)}
.c6::before{background:var(--c6-bar)}
.c6 .cell-type-badge{background:rgba(34,197,94,0.25)}

.c7{background:var(--c7-bg);border:1px solid var(--c7-border);color:var(--c7-text)}
.c7::before{background:var(--c7-bar)}
.c7 .cell-type-badge{background:rgba(236,72,153,0.25)}

/* ─── MODAL ──────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
.modal{
  background:var(--card);border:1px solid var(--border2);
  border-radius:14px;width:100%;max-width:480px;
  max-height:82vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--card2);border-radius:2px}
.modal-head{
  padding:1.2rem 1.4rem 0.8rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  position:sticky;top:0;background:var(--card);z-index:2;
}
.modal-title{font-size:0.9rem;font-weight:600;color:var(--text);line-height:1.3}
.modal-sub{font-size:0.7rem;color:var(--text3);margin-top:3px}
.modal-close{
  background:var(--card2);border:none;width:26px;height:26px;border-radius:6px;
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:12px;margin-top:-2px;
  transition:all 0.15s;
}
.modal-close:hover{background:var(--border3);color:var(--text)}
.modal-body{padding:0.8rem 1.4rem 1.4rem}

/* Section card */
.sec-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;
}
.sec-card:hover{border-color:var(--border3);background:var(--bg2)}
.sec-card.conflict-sec{opacity:0.5}
.sec-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sec-badge{font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:600;color:var(--accent3)}
.sec-conflict{font-size:0.62rem;color:#fda4af;background:rgba(244,63,94,0.1);padding:2px 7px;border-radius:4px}
.sec-docente{font-size:0.68rem;color:var(--text3);margin-bottom:6px}
.ses-row{display:flex;align-items:center;gap:7px;padding:2px 0;font-size:0.7rem;color:var(--text2)}
.type-T{background:rgba(59,130,246,0.15);color:#93c5fd;font-size:0.6rem;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0}
.type-P{background:rgba(20,184,166,0.15);color:#5eead4;font-size:0.6rem;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0}
.type-L{background:rgba(245,158,11,0.15);color:#fcd34d;font-size:0.6rem;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0}
.type-S{background:rgba(168,85,247,0.15);color:#d8b4fe;font-size:0.6rem;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0}

/* Toast */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  background:var(--card2);border:1px solid var(--border2);border-radius:10px;
  padding:11px 16px;font-size:0.8rem;color:var(--text);
  display:flex;align-items:center;gap:9px;
  transform:translateY(70px);opacity:0;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show{transform:translateY(0);opacity:1}
.toast-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.toast.success .toast-dot{background:#22c55e;box-shadow:0 0 8px #22c55e}
.toast.error .toast-dot{background:#f43f5e;box-shadow:0 0 8px #f43f5e}

/* Printable schedule for PDF */
#printable{
  background:#0d0f18;padding:24px 28px;border-radius:12px;
  font-family:'Outfit',sans-serif;
}
#printable .pt{color:#e8e4ff}
#printable .ptm{color:#9895b8}
#printable .pts{color:#4d4a6a}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">&#x26A1;</div>
    <div>
      <div class="logo-text">FIEE &middot; UNI</div>
      <div class="logo-sub">Horarios 2026-1</div>
    </div>
  </div>
  <div class="header-center">Facultad de Ingenier&iacute;a El&eacute;ctrica y Electr&oacute;nica</div>
</header>

<div class="app">
  <div class="panel-left">
    <div class="panel-top">
      <div class="panel-label">Cursos disponibles</div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Buscar por nombre o c&oacute;digo..." oninput="filterCourses()">
      </div>
      <label class="upload-label" for="file-input">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        Cargar tu propio Excel de horarios
      </label>
      <input type="file" id="file-input" accept=".xlsx,.xls" onchange="loadExcel(event)">

:"EE708","secc":"M","curso":"SISTEMAS DE CONMUTACIÓN DE TELECOMUNICACIONES","docente":"TRONCOSO CASTRO, PAUL FERNANDO","tipo":"T","ciclo":11,"dia":"MA","hIni":14,"hFin":16,"salon":"Q1-105"},{"esp":"CB","cod":"IP101","secc":"M","curso":"INGLES PROFESIONAL I","docente":"FERNANDEZ MALPARTIDA, WALTER MIGUEL","tipo":"T","ciclo":11,"dia":"VI","hIni":10,"hFin":12,"salon":"Q1-208"},{"esp":"CB","cod":"IP101","secc":"N","curso":"INGLES PROFESIONAL I","docente":"FERNANDEZ MALPARTIDA, WALTER MIGUEL","tipo":"T","ciclo":11,"dia":"VI","hIni":12,"hFin":14,"salon":"Q1-208"},{"esp":"L3","cod":"TLN03","secc":"M","curso":"AUTOMATIZACIÓN Y PROGRAMABILIDAD DE REDES","docente":"JANAMPA GOICOCHEA, ARTURO","tipo":"L","ciclo":11,"dia":"SA","hIni":19,"hFin":21,"salon":"Q4-210B"},{"esp":"L3","cod":"TLN03","secc":"M","curso":"AUTOMATIZACIÓN Y PROGRAMABILIDAD DE REDES","docente":"JANAMPA GOICOCHEA, ARTURO","tipo":"T","ciclo":11,"dia":"JU","hIni":20,"hFin":22,"salon":"LIFIEE-302"},{"esp":"L3","cod":"TLN04","secc":"M","curso":"ENRUTAMIENTO AVANZADO","docente":"QUILLAS FIESTAS, JUAN CARLOS","tipo":"L","ciclo":11,"dia":"MA","hIni":18,"hFin":20,"salon":"Q4-001a"},{"esp":"L3","cod":"TLN04","secc":"M","curso":"ENRUTAMIENTO AVANZADO","docente":"QUILLAS FIESTAS, JUAN CARLOS","tipo":"T","ciclo":11,"dia":"MA","hIni":20,"hFin":22,"salon":"Q4-001a"},{"esp":"L3","cod":"TLN05","secc":"M","curso":"ARQUITECTURA DE SERVIDORES Y CENTRO DE DATOS","docente":"ROMERO CACHA, MIGUEL ANGEL","tipo":"L","ciclo":11,"dia":"LU","hIni":20,"hFin":22,"salon":"Q4-210C"},{"esp":"L3","cod":"TLN05","secc":"M","curso":"ARQUITECTURA DE SERVIDORES Y CENTRO DE DATOS","docente":"ROMERO CACHA, MIGUEL ANGEL","tipo":"T","ciclo":11,"dia":"LU","hIni":18,"hFin":20,"salon":"Q4-210C"},{"esp":"L3","cod":"TLN07","secc":"M","curso":"FUNDAMENTOS DE COMPUTACIÓN EN LA NUBE","docente":"CALDAS NUÑEZ, JESÚS MANUEL","tipo":"L","ciclo":11,"dia":"LU","hIni":20,"hFin":22,"salon":"Q4-001a"},{"esp":"L3","cod":"TLN07","secc":"M","curso":"FUNDAMENTOS DE COMPUTAC let allCourses=[], selected={}, colorMap={}, colorIdx=0, filterCycle="all";

function processData(rows){
  const map={};
  rows.forEach(function(r){
    const k=r.cod+"|"+r.secc;
    if(!map[k]) map[k]={cod:r.cod,curso:r.curso,secc:r.secc,ciclo:r.ciclo,docente:r.docente,sessions:[]};
    map[k].sessions.push({tipo:r.tipo,dia:r.dia,hIni:r.hIni,hFin:r.hFin,salon:r.salon});
  });
  const cm={};
  Object.values(map).forEach(function(s){
    if(!cm[s.cod]) cm[s.cod]={cod:s.cod,curso:s.curso,ciclo:s.ciclo,sections:[]};
    cm[s.cod].sections.push(s);
  });
  allCourses=Object.values(cm).sort(function(a,b){return a.ciclo-b.ciclo||a.cod.localeCompare(b.cod);});
  selected={};colorMap={};colorIdx=0;
  buildChips();renderList();renderSchedule();renderTags();
}

function buildChips(){
  const cycles=[...new Set(allCourses.map(function(c){return c.ciclo;}))].sort(function(a,b){return a-b;});
  const el=document.getElementById("cycle-chips");
  el.innerHTML="";
  const allBtn=document.createElement("button");
  allBtn.className="chip active";
  allBtn.textContent="Todos";
  allBtn.addEventListener("click", function(){filterByCycle("all",this);});
  el.appendChild(allBtn);
  cycles.forEach(function(c){
    const b=document.createElement("button");
    b.className="chip";
    b.textContent="C"+c;
    b.addEventListener("click", function(){filterByCycle(c,this);});
    el.appendChild(b);
  });
}

function filterByCycle(c,el){
  filterCycle=c;
  document.querySelectorAll(".chip").forEach(function(x){x.classList.remove("active");});
  el.classList.add("active");
  filterCourses();
}

function filterCourses(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  const list=allCourses.filter(function(c){
    const cm=filterCycle==="all"||c.ciclo==filterCycle;
    const qm=!q||c.cod.toLowerCase().includes(q)||c.curso.toLowerCase().includes(q);
    return cm&&qm;
  });
  renderList(list);
}

function renderList(courses){
  if(!courses) courses=allCourses;
  const el=document.getElementById("course-list");
  if(!courses.length){
    el.innerHTML="<div style=\"padding:1.5rem;color:var(--text3);font-size:0.8rem;text-align:center\">Sin resultados</div>";
    return;
  }
  let html="", lastCy=null;
  courses.forEach(function(c){
    if(c.ciclo!==lastCy){
      lastCy=c.ciclo;
      const lab=CYCLELABELS[c.ciclo]||c.ciclo;
      html+="<div class=\"cycle-header\">"+lab+" CICLO</div>";
    }
    const isSel=!!selected[c.cod];
    const isConf=!isSel&&hasConflict(c);
    const selSec=selected[c.cod];
    const meta=selSec?"Secci\u00f3n "+selSec.secc+" \u00b7 "+selSec.sessions.length+" ses."
                     :c.sections.length+" secci\u00f3n"+(c.sections.length>1?"es":"");
    html+="<div class=\"course-item"+(isSel?" selected":"")+(isConf?" conflict":"")+"\" data-cod=\""+c.cod+"\">";
    html+="<div class=\"check-box\"></div>";
    html+="<div class=\"course-info\">";
    html+="<div class=\"course-name\">"+c.curso+"</div>";
    html+="<div class=\"course-meta\"><span class=\"course-cod\">"+c.cod+"</span><span>"+meta+"</span>";
    if(isConf) html+="<span class=\"conflict-pill\">conflicto</span>";
    html+="</div></div></div>";
  });
  el.innerHTML=html;
  el.querySelectorAll(".course-item").forEach(function(item){
    item.addEventListener("click", function(){toggleCourse(item.dataset.cod);});
  });
}

function toggleCourse(cod){
  if(selected[cod]){delete selected[cod];delete colorMap[cod];refresh();return;}
  const c=allCourses.find(function(x){return x.cod===cod;});
  if(!c) return;
  if(c.sections.length===1){addSection(c.sections[0],cod);}
  else showModal(c);
}

function addSection(sec,cod){
  if(!colorMap[cod]){colorMap[cod]=COLORS[colorIdx%COLORS.length];colorIdx++;}
  selected[cod]=sec;
  document.getElementById("modal-overlay").style.display="none";
  refresh();
}

function refresh(){filterCourses();renderSchedule();renderTags();}

function hasConflict(course){return course.sections.every(function(s){return conflictsSec(s);});}
function conflictsSec(sec){
  return sec.sessions.some(function(ss){
    return Object.values(selected).some(function(sel){
      return sel.sessions.some(function(s){
        return s.dia===ss.dia&&!(ss.hFin<=s.hIni||ss.hIni>=s.hFin);
      });
    });
  });
}

function showModal(course){
  document.getElementById("modal-title").textContent=course.curso;
  document.getElementById("modal-sub").textContent=course.cod+" \u00b7 Ciclo "+course.ciclo+" \u00b7 Elige una secci\u00f3n";
  const body=document.getElementById("modal-body");
  let html="";
  course.sections.forEach(function(sec,i){
    const isConf=conflictsSec(sec);
    html+="<div class=\"sec-card"+(isConf?" conflict-sec":"")+"\" data-idx=\""+i+"\">";
    html+="<div class=\"sec-card-top\"><span class=\"sec-badge\">Secci\u00f3n "+sec.secc+"</span>";
    if(isConf) html+="<span class=\"sec-conflict\">Conflicto de horario</span>";
    html+="</div><div class=\"sec-docente\">"+sec.docente+"</div>";
    sec.sessions.forEach(function(s){
      html+="<div class=\"ses-row\"><span class=\"type-"+s.tipo+"\">"+(TNAMES[s.tipo]||s.tipo)+"</span>";
      html+="<span>"+(DNAMES[s.dia]||s.dia)+" "+s.hIni+":00\u2013"+s.hFin+":00</span>";
      html+="<span style=\"color:var(--text3)\">"+s.salon+"</span></div>";
    });
    html+="</div>";
  });
  body.innerHTML=html;
  body.querySelectorAll(".sec-card").forEach(function(card){
    const idx=parseInt(card.dataset.idx);
    card.addEventListener("click",function(){addSection(course.sections[idx],course.cod);});
  });
  document.getElementById("modal-overlay").style.display="flex";
}

function closeOverlay(e){
  if(e.target===document.getElementById("modal-overlay"))
    document.getElementById("modal-overlay").style.display="none";
}

function renderTags(){
  const keys=Object.keys(selected);
  const bar=document.getElementById("sel-bar");
  const actions=document.getElementById("bar-actions");
  const stats=document.getElementById("stats-bar");
  if(!keys.length){
    while(bar.firstChild) bar.removeChild(bar.firstChild);
    const hint=document.createElement("span");
    hint.className="empty-hint";
    hint.textContent="\u2190 Selecciona cursos para construir tu horario";
    bar.appendChild(hint);
    actions.style.display="none";stats.style.display="none";return;
  }
  const tagColors={c0:"#6366f1",c1:"#14b8a6",c2:"#f43f5e",c3:"#f59e0b",c4:"#3b82f6",c5:"#a855f7",c6:"#22c55e",c7:"#ec4899"};
  let html="";
  keys.forEach(function(cod){
    const sec=selected[cod];const col=colorMap[cod]||"c0";const hex=tagColors[col];
    html+="<div class=\"sel-tag\" style=\"background:"+hex+"1a;border:1px solid "+hex+"40;color:"+hex+"\" data-cod=\""+cod+"\">";
    html+=cod+" "+sec.secc;
    html+="<i class=\"rx\">\u00d7</i></div>";
  });
  bar.innerHTML=html;
  bar.querySelectorAll(".sel-tag").forEach(function(tag){
    tag.querySelector(".rx").addEventListener("click",function(e){
      e.stopPropagation();toggleCourse(tag.dataset.cod);
    });
  });
  bar.appendChild(actions);actions.style.display="flex";
  stats.style.display="flex";
  let h=0;
  Object.values(selected).forEach(function(s){s.sessions.forEach(function(x){h+=x.hFin-x.hIni;});});
  document.getElementById("s-courses").textContent=keys.length;
  document.getElementById("s-hours").textContent=h;
  const cy=[...new Set(allCourses.filter(function(c){return selected[c.cod];}).map(function(c){return c.ciclo;}))].sort();
  document.getElementById("s-cycles").textContent=cy.join(", ");
}

function renderSchedule(){
  const keys=Object.keys(selected);
  const display=document.getElementById("sched-display");
  if(!keys.length){
    display.innerHTML="<div class=\"empty-state\"><div class=\"empty-icon\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" opacity=\"0.4\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"/><line x1=\"16\" x2=\"16\" y1=\"2\" y2=\"6\"/><line x1=\"8\" x2=\"8\" y1=\"2\" y2=\"6\"/><line x1=\"3\" x2=\"21\" y1=\"10\" y2=\"10\"/></svg></div><h3>Tu horario aparecer\u00e1 aqu\u00ed</h3><p>Selecciona los cursos que vas a llevar este semestre.</p></div>";
    return;
  }
  const cells={};const conflicts=[];
  keys.forEach(function(cod){
    const sec=selected[cod];const col=colorMap[cod]||"c0";
    sec.sessions.forEach(function(s){
      for(let h=s.hIni;h<s.hFin;h++){
        const k=s.dia+"-"+h;
        if(cells[k]&&cells[k].cod!==cod) conflicts.push(cells[k].cod+" y "+cod+" \u2014 "+(DNAMES[s.dia]||s.dia)+" "+h+":00");
        cells[k]={cod:cod,secc:sec.secc,tipo:s.tipo,salon:s.salon,color:col};
      }
    });
  });
  const alert=document.getElementById("conf-alert");
  if(conflicts.length){
    alert.classList.add("show");
    document.getElementById("conf-msg").textContent="Conflicto: "+conflicts[0]+(conflicts.length>1?" (+"+(conflicts.length-1)+" m\u00e1s)":"");
  } else {
    alert.classList.remove("show");
  }
  const allH=Object.values(selected).reduce(function(arr,s){return arr.concat(s.sessions.reduce(function(a,x){return a.concat([x.hIni,x.hFin]);},[]));}, []);
  const minH=Math.min.apply(null,allH), maxH=Math.max.apply(null,allH);
  const hours=[];for(let i=minH;i<maxH;i++) hours.push(i);

  let html="<div class=\"sched-grid\" id=\"printable\">";
  html+="<div class=\"sched-title\">HORARIO SEMANAL \u00b7 2026-1</div>";
  html+="<table class=\"sched\"><thead><tr><th></th>";
  DAYS.forEach(function(d){html+="<th><div class=\"day-col-head\">"+(DNAMES[d]||d)+"</div></th>";});
  html+="</tr></thead><tbody>";
  hours.forEach(function(h){
    html+="<tr><td>"+h+":00</td>";
    DAYS.forEach(function(d){
      const c=cells[d+"-"+h];
      if(!c){html+="<td><div class=\"cell-empty\"></div></td>";return;}
      html+="<td><div class=\"cell-block "+c.color+"\">";
      html+="<div class=\"cell-code\">"+c.cod+" <span style=\"opacity:0.7\">"+c.secc+"</span></div>";
      html+="<div class=\"cell-type-badge\">"+(TNAMES[c.tipo]||c.tipo)+"</div>";
      if(c.salon) html+="<div class=\"cell-room\">"+c.salon+"</div>";
      html+="</div></td>";
    });
    html+="</tr>";
  });
  html+="</tbody></table></div>";
  display.innerHTML=html;
}

function clearAll(){selected={};colorMap={};colorIdx=0;refresh();}

function downloadPDF(){
  const el=document.getElementById("printable");
  if(!el){showToast("No hay horario para exportar","error");return;}
  showToast("Generando PDF\u2026","success");
  html2canvas(el,{backgroundColor:"#0d0f18",scale:2.5,useCORS:true,logging:false}).then(function(canvas){
    const pdf=new window.jspdf.jsPDF({
      orientation:canvas.width>canvas.height?"landscape":"portrait",
      unit:"px",
      format:[canvas.width/2.5+48, canvas.height/2.5+60]
    });
    pdf.setFillColor(13,15,24);
    pdf.rect(0,0,canvas.width/2.5+48,canvas.height/2.5+60,"F");
    pdf.setTextColor(99,102,241);pdf.setFontSize(9);
    pdf.text("FIEE \u00b7 UNI \u2014 HORARIO 2026-1",24,18);
    pdf.addImage(canvas.toDataURL("image/png"),"PNG",24,28,canvas.width/2.5,canvas.height/2.5);
    pdf.save("horario_fiee_2026-1.pdf");
    showToast("\u2713 PDF descargado","success");
  }).catch(function(){showToast("Error al generar PDF","error");});
}

function showToast(msg,type){
  const t=document.getElementById("toast");
  document.getElementById("toast-msg").textContent=msg;
  t.className="toast show "+(type||"");
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.classList.remove("show");},3000);
}

function loadExcel(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const rows=[];
      const CNAMES={PRIMER:1,SEGUNDO:2,TERCER:3,CUARTO:4,QUINTO:5,SEXTO:6,SEPTIMO:7,OCTAVO:8,NOVENO:9,DECIMO:10,ELECTIVOS:11};
      let cy=1;
      wb.SheetNames.forEach(function(name){
        const ws=wb.Sheets[name];
        const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        let hi=-1;
        for(let i=0;i<json.length;i++){
          const r=json[i].map(function(c){return String(c).toUpperCase().trim();});
          if(r.indexOf("COD")>=0&&r.indexOf("CURSO")>=0){hi=i;break;}
        }
        if(hi<0) return;
        const hs=json[hi].map(function(c){return String(c).toUpperCase().trim();});
        const ix=function(h){return hs.indexOf(h);};
        const iC=ix("COD"),iCu=ix("CURSO"),iS=ix("SECC"),iTi=ix("TIPO");
        const iCy=ix("CICLO"),iD=ix("DIA"),iHi=ix("H INI"),iHf=ix("H FIN"),iSa=ix("SALON"),iDo=ix("DOCENTE");
        for(let i=hi+1;i<json.length;i++){
          const r=json[i];
          if(!r[iC]&&r[0]){const w=String(r[0]).toUpperCase().split(" ")[0];if(CNAMES[w]) cy=CNAMES[w];continue;}
          if(!r[iC]||!r[iCu]||!r[iD]) continue;
          const hIni=parseInt(r[iHi]),hFin=parseInt(r[iHf]);
          if(isNaN(hIni)||isNaN(hFin)) continue;
          rows.push({cod:String(r[iC]).trim(),curso:String(r[iCu]).trim(),
            secc:String(r[iS]).trim().toUpperCase(),tipo:String(r[iTi]).trim().toUpperCase(),
            ciclo:parseInt(r[iCy])||cy,dia:String(r[iD]).trim().toUpperCase(),
            hIni:hIni,hFin:hFin,
            salon:iSa>=0?String(r[iSa]).trim():"",docente:iDo>=0?String(r[iDo]).trim():""});
        }
      });
      if(!rows.length){showToast("No se encontraron datos v\u00e1lidos","error");return;}
      processData(rows);
      showToast("\u2713 "+rows.length+" sesiones cargadas","success");
    }catch(err){showToast("Error: "+err.message,"error");}
  };
  reader.readAsBinaryString(file);
}

window.addEventListener("DOMContentLoaded",function(){processData(FIEE_DATA);});

</script>
